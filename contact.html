<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact · CLEMENSound</title>
    <meta
      name="description"
      content="CLEMENSound 음향 시스템 설치, 오퍼레이팅, 점검과 컨설팅 문의 접수 페이지입니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js" defer></script>
  </head>
  <body data-page="contact" data-footer-title="문의 접수 후 확인하여 연락드리겠습니다.">
    <div data-header></div>

    <main class="contact-page">
      <section class="contact-hero" aria-labelledby="contact-title">
        <p class="eyebrow">Request Form</p>
        <h1 id="contact-title">문의 및 접수</h1>
        <p>
          행사 음향 설치, 현장 오퍼레이팅, 기존 음향 시스템 점검과 컨설팅 요청 내용을 남겨주세요.
          접수 내용 확인하여 연락드리겠습니다.
        </p>
      </section>

      <section class="contact-section" aria-labelledby="form-title">
        <div class="contact-form-wrap">
          <div class="profile-section-heading">
            <p class="eyebrow">CLEMENSound</p>
            <h2 id="form-title">접수 내용</h2>
          </div>

          <form id="contactForm" class="contact-form">
            <div class="form-grid">
              <label for="name">
                이름 / 단체명
                <input type="text" id="name" name="name" autocomplete="name" required />
              </label>
              <label for="phone">
                연락처
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" autocomplete="tel" required />
              </label>
            </div>

            <label for="email">
              이메일
              <input type="email" id="email" name="email" placeholder="선택 입력" autocomplete="email" />
            </label>

            <div class="form-grid">
              <label for="request_type">
                문의 유형
                <select id="request_type" name="request_type" required>
                  <option value="">선택하세요</option>
                  <option value="음향 시스템 설치">음향 시스템 설치</option>
                  <option value="현장 오퍼레이팅">현장 오퍼레이팅</option>
                  <option value="기존 시스템 점검">기존 시스템 점검</option>
                  <option value="수정 및 컨설팅">수정 및 컨설팅</option>
                  <option value="기타 문의">기타 문의</option>
                </select>
              </label>
              <label for="event_date">
                행사 / 방문 희망일
                <input type="date" id="event_date" name="event_date" />
              </label>
            </div>

            <div class="form-grid">
              <label for="venue_type">
                장소 유형
                <select id="venue_type" name="venue_type" required>
                  <option value="">선택하세요</option>
                  <option value="실내 행사장">실내 행사장</option>
                  <option value="야외 행사장">야외 행사장</option>
                  <option value="종교시설">종교시설</option>
                  <option value="공연장">공연장</option>
                  <option value="카페 / 소규모 공간">카페 / 소규모 공간</option>
                  <option value="기타">기타</option>
                </select>
              </label>
              <label for="audience_count">
                예상 인원
                <input type="number" id="audience_count" name="audience_count" min="0" placeholder="예: 80" />
              </label>
            </div>

            <label for="address">
              행사 주소
              <div class="address-row">
                <input type="text" id="address" name="address" readonly placeholder="주소를 검색해주세요" required />
              </div>
            </label>

            <label for="address_detail">
              상세 주소 / 장소 설명
              <input type="text" id="address_detail" name="address_detail" placeholder="층, 홀 이름, 야외 위치 등" />
            </label>

            <div class="form-grid">
              <label for="mic_count">
                필요한 마이크 수량
                <input type="number" id="mic_count" name="mic_count" min="0" placeholder="예: 4" />
              </label>
              <label for="has_system">
                기존 음향 시스템
                <select id="has_system" name="has_system">
                  <option value="">선택하세요</option>
                  <option value="없음">없음</option>
                  <option value="있음">있음</option>
                  <option value="확인 필요">확인 필요</option>
                </select>
              </label>
            </div>

            <fieldset class="service-checks">
              <legend>필요한 항목</legend>
              <label><input type="checkbox" name="needs" value="스피커 설치" /> 스피커 설치</label>
              <label><input type="checkbox" name="needs" value="마이크 세팅" /> 마이크 세팅</label>
              <label><input type="checkbox" name="needs" value="음원 재생" /> 음원 재생</label>
              <label><input type="checkbox" name="needs" value="연주 / 공연 믹스" /> 연주 / 공연 믹스</label>
              <label><input type="checkbox" name="needs" value="기존 시스템 점검" /> 기존 시스템 점검</label>
              <label><input type="checkbox" name="needs" value="하울링 / 노이즈 개선" /> 하울링 / 노이즈 개선</label>
            </fieldset>

            <label for="message">
              문의 내용
              <textarea id="message" name="message" rows="6" placeholder="행사 순서, 필요한 장비, 현재 문제 증상 등을 적어주세요." required></textarea>
            </label>

            <label for="attachment">
              참고 사진 / 자료
              <input type="file" id="attachment" name="attachment" accept="image/*,.pdf" />
            </label>

            <div class="privacy-box">
              <label for="privacyAgree">
                <input type="checkbox" id="privacyAgree" required />
                개인정보 수집 및 이용에 동의합니다.
              </label>
              <button type="button" id="viewPrivacy">전문보기</button>
            </div>

            <button type="submit" class="button primary submit-button" disabled>접수하기</button>
            <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <div id="loading-message" class="loading-overlay" hidden>
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p>접수 등록 중입니다.<br />잠시만 기다려 주세요.</p>
      </div>
    </div>

    <div id="privacy-modal" class="modal" hidden>
      <div class="modal-content">
        <button type="button" class="close" aria-label="닫기">&times;</button>
        <h2>개인정보 수집 및 이용 안내</h2>
        <p>
          수집된 개인정보는 문의 확인, 일정 조율, 견적 및 서비스 응대를 위한 목적으로만 사용됩니다.
          접수자는 이에 동의하며, 요청 시 접수 정보 삭제를 요청할 수 있습니다.
        </p>
      </div>
    </div>

    <div data-footer></div>
    <script src="common.js"></script>
    <script src="contact.js?v=20260425-forms-2"></script>
  </body>
</html>
