<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile · CLEMENSound</title>
    <meta
      name="description"
      content="CLEMENSound 프로필 페이지입니다. 현장 음향 설치, 오퍼레이팅, 점검과 컨설팅 이력을 정리합니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="profile" data-footer-title="프로필에 들어갈 내용은 천천히 채워가면 됩니다.">
    <div data-header></div>

    <main class="profile-page">
      <section class="profile-hero" aria-labelledby="profile-title">
        <canvas class="sound-canvas" aria-hidden="true"></canvas>
        <div class="hero-shade" aria-hidden="true"></div>
        <p class="eyebrow">Profile</p>
        <h1 id="profile-title">CLEMENSound Profile</h1>
        <p>
          이력
        </p>
      </section>

      <section class="profile-section" aria-labelledby="experience-title">
        <div class="profile-section-heading">
          <p class="eyebrow">Career</p>
          <h2 id="experience-title">이력</h2>
        </div>
        <div class="record-list record-list-career">
          <article class="record-item">
            <div class="record-photo">
              <img src="assets/images/profile/chugye.jpg" alt="추계 예술 대학교" />
            </div>
            <h3>추계 예술 대학교</h3>
            <p>실용음악학과 음향 전공 학사 졸업</p>
            <p class="record-period">2007~2010</p>
          </article>
          <article class="record-item">
            <div class="record-photo">
              <img src="assets/images/CLEMENSound-Logo.jpg" alt="공연 및 종교 모임 이력 사진" />
            </div>
            <h3>공연 · 종교 모임</h3>
            <p>공연, 예배, 찬양팀, 소규모 무대 운영 경험을 정리하세요.</p>
            <p class="record-period">기간 입력</p>
          </article>
          <article class="record-item">
            <div class="record-photo">
              <img src="assets/images/CLEMENSound-Logo.jpg" alt="시스템 점검 이력 사진" />
            </div>
            <h3>시스템 점검</h3>
            <p>교회, 카페, 교육장, 공연장 등 설치 음향 개선 이력을 정리하세요.</p>
            <p class="record-period">기간 입력</p>
          </article>
        </div>
      </section>
    </main>

    <div data-footer></div>
    <script src="common.js"></script>
    <script src="script.js"></script>
  </body>
</html>
